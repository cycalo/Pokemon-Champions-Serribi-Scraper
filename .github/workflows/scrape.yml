name: Scrape Pokémon Champions

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # v6 / v6 run on Node.js 24 (v4 / v5 used Node 20, deprecated on GH-hosted runners)
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Run scrapers
        run: python scraper/main.py

      - name: Commit & push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ images/

          if git diff --cached --quiet; then
            echo "No data or image changes detected. Skipping commit."
            exit 0
          fi

          git commit -m "chore(data): refresh Pokémon Champions data"
          git push
